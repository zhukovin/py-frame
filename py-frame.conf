# py-frame configuration
#
# [schedule]
# Auto-scheduling window: the screen goes black and the slideshow pauses
# during this window, then resumes automatically when it ends. Times are
# 24-hour HH:MM. A window that wraps past midnight (e.g. 22:00 -> 07:00)
# is supported.

[schedule]
start = 7:57
end = 08:10
